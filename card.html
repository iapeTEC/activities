<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Card IAPE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Biblioteca de QR Code (client-side, funciona no GitHub Pages) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #cardContainer {
      background: transparent;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    canvas {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
    }
    #info {
      text-align: center;
      font-size: 14px;
      color: #555;
    }
    #downloadBtn {
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      background: #2b5aa8;
      color: white;
    }
    #downloadBtn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .statement-card {
      background: white;
      border-radius: 12px;
      padding: 0.75rem 1rem 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      max-width: 900px;
      width: 100%;
    }
    .statement-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
      text-align: left;
    }
    #statement-list {
      border-radius: 0.75rem;
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .statement-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.6rem;
      font-size: 0.85rem;
    }
    .statement-row:nth-child(odd) {
      background: #f9fafb;
    }
    .statement-row:nth-child(even) {
      background: #ffffff;
    }
    .statement-desc {
      flex: 1;
      margin-right: 0.5rem;
    }
    .statement-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      gap: 2px;
    }
    .statement-amount.debit {
      color: #b91c1c;
    }
    .statement-amount.credit {
      color: #15803d;
    }
    .statement-empty {
      font-size: 0.85rem;
      color: #6b7280;
      padding: 0.5rem 0.6rem;
    }
  </style>
</head>
<body>
  <div id="cardContainer">
    <canvas id="cardCanvas" width="900" height="540"></canvas>
  </div>
  <div id="info">Carregando dados do cartão...</div>
  <button id="downloadBtn" disabled>Baixar cartão em PNG</button>

  <div class="statement-card">
    <div class="statement-title">Extrato recente</div>
    <div id="statement-list">
      <p class="statement-empty">Nenhuma movimentação registrada ainda.</p>
    </div>
  </div>

  <script>
    // CONFIGURE AQUI:
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqfA1JLzSu-cvjy4qed-O3Tgil_KKggwW0v0qXpF7TsxSnK-aHoZYN3nFDOfmioIC4/exec';

    const params = new URLSearchParams(window.location.search);
    const token = params.get('t') || params.get('token'); // aceita ?t= ou ?token=

    const infoEl = document.getElementById('info');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');

    let updating = false;

    if (!token) {
      infoEl.textContent = 'Token não encontrado na URL.';
    } else {
      atualizarTudo(true);
      // atualiza a cada 1 segundo
      setInterval(() => atualizarTudo(false), 1000);
    }

    function atualizarTudo(initial) {
      if (updating || !token) return;
      updating = true;
      if (initial) {
        infoEl.textContent = 'Carregando dados do cartão...';
      }

      const urlCard = APPS_SCRIPT_URL + '?action=card&token=' + encodeURIComponent(token);
      const urlStmt = APPS_SCRIPT_URL + '?action=statement&token=' + encodeURIComponent(token) + '&limit=20';

      Promise.all([
        fetch(urlCard).then(r => r.json()),
        fetch(urlStmt).then(r => r.json()).catch(() => null)
      ])
      .then(([cardData, stmtData]) => {
        if (!cardData.success) {
          infoEl.textContent = 'Erro: ' + (cardData.error || 'falha ao carregar cartão');
          return;
        }
        desenharCartao(cardData);

        if (stmtData && stmtData.success) {
          renderStatement(stmtData);
        }

        const now = new Date();
        infoEl.textContent = 'Última atualização: ' + now.toLocaleTimeString('pt-BR');
        downloadBtn.disabled = false;
        if (!downloadBtn._initialized) {
          downloadBtn.addEventListener('click', baixarPNG);
          downloadBtn._initialized = true;
        }
      })
      .catch(err => {
        console.error(err);
        infoEl.textContent = 'Erro de conexão ao carregar o cartão.';
      })
      .finally(() => {
        updating = false;
      });
    }

    function desenharCartao(data) {
      const nome = data.name;
      const balance = Number(data.balance || 0);
      const saldoFormatado = balance.toLocaleString('pt-BR', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

      // Background da página (fora do cartão)
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Cartão estilo "Black" (cantos arredondados)
      const cardX = 30;
      const cardY = 30;
      const cardW = canvas.width - 60;
      const cardH = canvas.height - 60;
      const radius = 32;

      // Sombra
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = 24;
      ctx.shadowOffsetY = 10;
      roundRect(ctx, cardX, cardY, cardW, cardH, radius);
      ctx.fillStyle = '#0b0c0f';
      ctx.fill();
      ctx.restore();

      // Fundo com gradiente sutil
      const g = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY + cardH);
      g.addColorStop(0, '#0a0b0f');
      g.addColorStop(0.55, '#111318');
      g.addColorStop(1, '#05060a');

      ctx.save();
      roundRect(ctx, cardX, cardY, cardW, cardH, radius);
      ctx.clip();
      ctx.fillStyle = g;
      ctx.fillRect(cardX, cardY, cardW, cardH);

      // Textura discreta (pontos)
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = '#ffffff';
      for (let y = cardY + 18; y < cardY + cardH; y += 14) {
        for (let x = cardX + 18; x < cardX + cardW; x += 14) {
          ctx.fillRect(x, y, 1, 1);
        }
      }
      ctx.globalAlpha = 1;

      // Filete dourado (borda interna)
      ctx.lineWidth = 2;
      const goldGrad = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY);
      goldGrad.addColorStop(0, '#d7b76a');
      goldGrad.addColorStop(0.5, '#f3e5b5');
      goldGrad.addColorStop(1, '#b88a2f');
      ctx.strokeStyle = goldGrad;
      roundRect(ctx, cardX + 6, cardY + 6, cardW - 12, cardH - 12, radius - 6);
      ctx.stroke();

      // Cabeçalho
      ctx.fillStyle = '#e7d7a6';
      ctx.font = '700 34px "Segoe UI", system-ui';
      ctx.fillText('Bank of IAPE', cardX + 34, cardY + 72);

      // Selo "Infinity Black" no canto superior direito
      ctx.textAlign = 'right';
      ctx.fillStyle = '#f3e5b5';
      ctx.font = 'italic 28px "Brush Script MT", "Segoe Script", "Snell Roundhand", cursive';
      ctx.fillText('Infinity Black', cardX + cardW - 34, cardY + 72);
      ctx.textAlign = 'left';

      // Logo (opcional)
      const logo = new Image();
      logo.src = 'iape.png?text=IAPE';

      logo.onload = function() {
        const logoSize = 88;
        ctx.drawImage(logo, cardX + cardW - logoSize - 34, cardY + 92, logoSize, logoSize);
        desenharTextoCartao(nome, saldoFormatado, { cardX, cardY, cardW, cardH });
      };

      logo.onerror = function() {
        desenharTextoCartao(nome, saldoFormatado, { cardX, cardY, cardW, cardH });
      };

      ctx.restore();
    }

    function desenharTextoCartao(nome, saldoFormatado, layout) {
      const cardX = layout?.cardX ?? 30;
      const cardY = layout?.cardY ?? 30;
      const cardW = layout?.cardW ?? (canvas.width - 60);
      const cardH = layout?.cardH ?? (canvas.height - 60);

      const left = cardX + 34;
      const topBase = cardY + 160;

      // Nome do responsável
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 30px "Segoe UI", system-ui';
      ctx.fillText('Titular', left, topBase);

      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.font = '26px "Segoe UI", system-ui';
      wrapText(ctx, nome, left, topBase + 38, cardW - 320, 32);

      // Saldo
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 28px "Segoe UI", system-ui';
      ctx.fillText('Saldo disponível', left, topBase + 140);

      const goldGrad2 = ctx.createLinearGradient(left, 0, left + 380, 0);
      goldGrad2.addColorStop(0, '#d7b76a');
      goldGrad2.addColorStop(0.45, '#f3e5b5');
      goldGrad2.addColorStop(1, '#b88a2f');
      ctx.fillStyle = goldGrad2;
      ctx.font = '800 60px "Segoe UI", system-ui';
      ctx.fillText('R$ ' + saldoFormatado, left, topBase + 220);

      // Texto auxiliar
      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      ctx.font = '20px "Segoe UI", system-ui';
      ctx.fillText('Apresente este cartão na lojinha para pagar suas compras.', left, cardY + cardH - 56);

      // Link deste próprio cartão (vai dentro do QR)
      const cardUrl = window.location.origin + window.location.pathname + '?t=' + encodeURIComponent(token);

      gerarQR(cardUrl, function(qrCanvas) {
        const qrSize = 220;
        const qrX = cardX + cardW - qrSize - 34;
        const qrY = cardY + cardH - qrSize - 34;

        // fundo do QR
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        roundRect(ctx, qrX - 10, qrY - 10, qrSize + 20, qrSize + 20, 18);
        ctx.fill();
        ctx.restore();

        ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);
      });
    }

    // Rounded rectangle helper (canvas 2D)
    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    // Gera um QR code em uma canvas temporária e devolve essa canvas no callback
    function gerarQR(text, callback) {
      if (typeof QRCode === 'undefined') {
        console.error('Biblioteca QRCode não carregada.');
        infoEl.textContent = 'Erro: biblioteca de QR não carregou (QRCode undefined).';
        return;
      }

      const qrCanvas = document.createElement('canvas');

      QRCode.toCanvas(qrCanvas, text, {
        width: 220,
        margin: 1
      }, function (error) {
        if (error) {
          console.error(error);
          infoEl.textContent = 'Erro ao gerar QR code.';
          return;
        }
        callback(qrCanvas);
      });
    }

    function renderStatement(stmtData) {
      const container = document.getElementById('statement-list');
      if (!container) return;

      const items = stmtData.items || [];
      if (!items.length) {
        container.innerHTML = '<p class="statement-empty">Nenhuma movimentação registrada ainda.</p>';
        return;
      }

      const html = items.map(item => {
        const ts = new Date(item.timestamp);
        const hora = ts.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const data = ts.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        const valor = Number(item.amount || 0);
        const saldo = Number(item.balanceAfter || 0);

        let tipoLabel = 'Movimentação';
        let classe = '';
        if (item.type === 'DEBIT') {
          tipoLabel = 'Débito';
          classe = 'debit';
        } else if (item.type === 'CREDIT' || item.type === 'CREDIT_ADD' || item.type === 'CREDIT_INIT') {
          tipoLabel = 'Crédito';
          classe = 'credit';
        }

        const desc = item.description || tipoLabel;

        return `
          <div class="statement-row">
            <div class="statement-desc">
              <div>${desc}</div>
              <div style="font-size:0.75rem;color:#6b7280;">${data} • ${hora}</div>
            </div>
            <div class="statement-meta">
              <div class="statement-amount ${classe}">
                ${valor >= 0 ? '' : '- '}${Math.abs(valor).toLocaleString('pt-BR', {
                  style: 'currency',
                  currency: 'BRL'
                })}
              </div>
              <div style="font-size:0.75rem;color:#6b7280;">
                Saldo: ${saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
              </div>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = html;
    }

    function baixarPNG() {
      const dataURL = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = dataURL;
      a.download = 'iape-card.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // helper simples pra quebrar texto em múltiplas linhas
    function wrapText(context, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ');
      let line = '';

      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + ' ';
        const metrics = context.measureText(testLine);
        const testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
          context.fillText(line, x, y);
          line = words[n] + ' ';
          y += lineHeight;
        } else {
          line = testLine;
        }
      }
      context.fillText(line, x, y);
    }
  </script>
</body>
</html>
