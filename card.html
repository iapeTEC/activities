<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Card IAPE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- QR Code (client-side, GitHub Pages ok) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #cardContainer {
      background: transparent;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }
    canvas {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      display:block;
    }
    #info {
      text-align: center;
      font-size: 14px;
      color: #555;
    }

    /* Saldo grande abaixo do cartão */
    #bigBalance {
      font-weight: 900;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1;
      letter-spacing: .3px;
      color: #15803d;
      text-align: center;
    }
    #bigBalance.zero {
      color: #000;
    }

    .statement-card {
      background: white;
      border-radius: 12px;
      padding: 0.75rem 1rem 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      max-width: 900px;
      width: 100%;
    }
    .statement-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
      text-align: left;
    }
    #statement-list {
      border-radius: 0.75rem;
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .statement-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.6rem;
      font-size: 0.85rem;
    }
    .statement-row:nth-child(odd) {
      background: #f9fafb;
    }
    .statement-row:nth-child(even) {
      background: #ffffff;
    }
    .statement-desc {
      flex: 1;
      margin-right: 0.5rem;
    }
    .statement-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      gap: 2px;
    }
    .statement-amount.debit {
      color: #b91c1c;
    }
    .statement-amount.credit {
      color: #15803d;
    }
    .statement-empty {
      font-size: 0.85rem;
      color: #6b7280;
      padding: 0.5rem 0.6rem;
    }


    .qr-big-wrap{
      width: min(520px, 92vw);
      aspect-ratio: 1 / 1;
      margin: 0 auto;
      background:#ffffff;
      border-radius:14px;
      padding:10px;
      box-sizing:border-box;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #qrBigCanvas{
      width:100%;
      height:100%;
      display:block;
      border-radius:10px;
      background:#ffffff;
    }

    /* Modal do código em tela cheia (mantém do antigo) */
    .qr-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }
    .qr-modal.show {
      display: flex;
    }
    .qr-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(2px);
    }
    .qr-modal-content {
      position: relative;
      z-index: 1;
      width: min(560px, 92vw);
      background: #0b0c0f;
      border: 1px solid rgba(215, 183, 106, 0.35);
      border-radius: 16px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.6);
      padding: 14px 14px 16px;
      color: #ffffff;
      text-align: center;
    }
    .qr-modal-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #f3e5b5;
      margin-bottom: 10px;
    }
    .qr-modal-link {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      word-break: break-all;
    }
    #qrModalClose {
      margin-top: 12px;
      background: #111827;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="cardContainer">
    <canvas id="cardCanvas" width="1536" height="864"></canvas>
  </div>

  <div id="bigBalance">R$ 0,00</div>
  <div id="info">Carregando dados do cartão...</div>

  <div class="statement-card">
    <div class="statement-title">Extrato recente</div>
    <div id="statement-list">
      <p class="statement-empty">Nenhuma movimentação registrada ainda.</p>
    </div>
  </div>

  <div id="qrModal" class="qr-modal" aria-hidden="true">
    <div class="qr-modal-backdrop" id="qrModalBackdrop"></div>
    <div class="qr-modal-content" role="dialog" aria-modal="true" aria-label="Código do cartão">
      <div class="qr-modal-title">Código do cartão</div>
      <div class="qr-big-wrap"><canvas id="qrBigCanvas" width="520" height="520"></canvas></div>
      <div id="qrModalLink" class="qr-modal-link"></div>
      <button id="qrModalClose" type="button">Fechar</button>
    </div>
  </div>

  <script>
    // API fixa do banco
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxR7KTYm8LH1VDBpXzZy--6t_dB2YgyMWvRXVvl-LZ7K6bTarMelTJun0wkASsxxWil/exec";

    // Artes (precisam estar na mesma pasta do card.html no GitHub Pages)
    const ART_INFINITY_CANDIDATES = ["Infinity Black.png","Infinity%20Black.png","Infinity Black.PNG","Infinity%20Black.PNG","infinity black.png","InfinityBlack.png"];
    const ART_DIAMOND_CANDIDATES  = ["diamond.png","diamond.PNG","Diamond.png","Diamond.PNG"];

    const params = new URLSearchParams(window.location.search);
    const token = (params.get('t') || params.get('token') || '').trim();

    const infoEl = document.getElementById('info');
    const bigBalanceEl = document.getElementById('bigBalance');

    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');

    let qrHitBox = null;
    let currentCardUrl = '';

    const qrModal = document.getElementById('qrModal');
    const qrModalBackdrop = document.getElementById('qrModalBackdrop');
    const qrModalClose = document.getElementById('qrModalClose');
    const qrBigCanvas = document.getElementById('qrBigCanvas');
    const qrModalLink = document.getElementById('qrModalLink');

    function isModalOpen() {
      return qrModal && qrModal.classList.contains('show');
    }
    function openQrModal() {
      if (!qrModal || !qrBigCanvas) return;
      qrModal.classList.add('show');
      qrModal.setAttribute('aria-hidden', 'false');

      if (typeof QRCode !== 'undefined' && currentCardUrl) {
        QRCode.toCanvas(qrBigCanvas, currentCardUrl, { width: 520, margin: 1 }, function (error) {
          if (error) console.error(error);
        });
      }
      if (qrModalLink) qrModalLink.textContent = currentCardUrl || '';
    }
    function closeQrModal() {
      if (!qrModal) return;
      qrModal.classList.remove('show');
      qrModal.setAttribute('aria-hidden', 'true');
    }
    if (qrModalBackdrop) qrModalBackdrop.addEventListener('click', closeQrModal);
    if (qrModalClose) qrModalClose.addEventListener('click', closeQrModal);
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isModalOpen()) closeQrModal();
    });

    function pointInRect(px, py, r) {
      return !!(r && px >= r.x && px <= (r.x + r.w) && py >= r.y && py <= (r.y + r.h));
    }

    canvas.addEventListener('click', (ev) => {
      if (!qrHitBox) return;
      if (isModalOpen()) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (ev.clientX - rect.left) * scaleX;
      const y = (ev.clientY - rect.top) * scaleY;

      if (pointInRect(x, y, qrHitBox)) {
        openQrModal();
      }
    });

    function fmtBRL(n) {
      const v = Number(n) || 0;
      return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }


    function inferTypeFromAccountId(cardData){
      const id = String((cardData && cardData.accountId) || '').toUpperCase();
      if (id.startsWith('DIAMOND_') || id.startsWith('DIAMOND')) return 'DIAMOND';
      return '';
    }

    function firstName(full) {
      const s = String(full || '').trim();
      if (!s) return '';
      return s.split(/\s+/)[0];
    }

    function pickArtCandidates(type) {
      const t = String(type || '').toUpperCase();
      return t.includes('DIAMOND') ? ART_DIAMOND_CANDIDATES : ART_INFINITY_CANDIDATES;
    }

    async function loadImageWithFallback(candidates) {
      const tried = [];
      for (const src of candidates) {
        tried.push(src);
        const img = new Image();
        img.crossOrigin = 'anonymous';
        const p = new Promise((res, rej) => {
          img.onload = () => res(img);
          img.onerror = () => rej(new Error('Falha ao carregar: ' + src));
        });
        img.src = src;
        try {
          return await p;
        } catch (e) {}
      }
      throw new Error('Não consegui carregar a arte. Verifique se as imagens estão no mesmo diretório. Tentativas: ' + tried.join(', '));
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function drawName(ctx, type, name) {
      const nm = firstName(name);
      if (!nm) return;

      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = 'rgba(0,0,0,0.55)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetY = 2;

      const fontPx = Math.round(canvas.height * 0.030);
      ctx.font = fontPx + 'px serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';

      if (String(type || '').toUpperCase().includes('DIAMOND')) {
        // abaixo do código, um pouco mais acima para não tocar na logo
        const x = Math.round(canvas.width * 0.73);
        const y = Math.round(canvas.height * 0.66);
        ctx.fillText(nm, x, y);
      } else {
        const x = Math.round(canvas.width * 0.07);
        const y = Math.round(canvas.height * 0.92);
        ctx.fillText(nm, x, y);
      }
      ctx.restore();
    }

    function buildCardUrl() {
      return window.location.origin + window.location.pathname + '?t=' + encodeURIComponent(token);
    }

    function gerarQR(text, size) {
      return new Promise((resolve, reject) => {
        if (typeof QRCode === 'undefined') {
          reject(new Error('Biblioteca QRCode não carregada.'));
          return;
        }
        const qrCanvas = document.createElement('canvas');
        QRCode.toCanvas(qrCanvas, text, { width: size, margin: 1 }, function (error) {
          if (error) return reject(error);
          resolve(qrCanvas);
        });
      });
    }

    async function desenharCartao(data) {
      const type = data.type || 'INFINITY_BLACK';
      const nome = data.name || 'Cliente';

      const bg = await loadImageWithFallback(pickArtCandidates(type));
      canvas.width = bg.naturalWidth || canvas.width;
      canvas.height = bg.naturalHeight || canvas.height;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

      // Link do cartão dentro do QR
      const cardUrl = buildCardUrl();
      currentCardUrl = cardUrl;

      // QR pequeno: Infinity sobe e vai mais pra direita (sem encostar)
      const qrSize = Math.round(canvas.width * 0.15);
      let qrX, qrY;
      if (String(type).toUpperCase().includes('DIAMOND')) {
        qrX = Math.round(canvas.width * 0.82);
        qrY = Math.round(canvas.height * 0.46);
      } else {
        qrX = Math.round(canvas.width * 0.86);
        qrY = Math.round(canvas.height * 0.34);
      }

      const qrCanvas = await gerarQR(cardUrl, qrSize);

      const pad = Math.round(qrSize * 0.10);
      const plateW = qrSize + pad*2;
      const plateH = qrSize + pad*2;
      const plateX = qrX - Math.round(plateW/2);
      const plateY = qrY - Math.round(plateH/2);

      // fundo branco do QR
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.96)';
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = Math.max(2, Math.round(qrSize * 0.015));
      roundRect(ctx, plateX, plateY, plateW, plateH, Math.round(qrSize * 0.10));
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      ctx.drawImage(qrCanvas, plateX + pad, plateY + pad, qrSize, qrSize);

      qrHitBox = { x: plateX, y: plateY, w: plateW, h: plateH };

      // Nome (apenas primeiro nome)
      drawName(ctx, type, nome);
    }

    function renderStatement(stmtData) {
      const container = document.getElementById('statement-list');
      if (!container) return;

      const items = (stmtData && stmtData.items) ? stmtData.items : [];
      if (!items.length) {
        container.innerHTML = '<p class="statement-empty">Nenhuma movimentação registrada ainda.</p>';
        return;
      }

      const html = items.map(item => {
        const ts = new Date(item.timestamp);
        const hora = ts.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const dt = ts.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        const valor = Number(item.amount || 0);
        const saldo = Number(item.balanceAfter || 0);

        let classe = '';
        if (item.type === 'DEBIT') classe = 'debit';
        else if (item.type === 'CREDIT' || item.type === 'CREDIT_ADD' || item.type === 'CREDIT_INIT') classe = 'credit';

        const desc = item.description || item.type || 'Movimentação';

        return `
          <div class="statement-row">
            <div class="statement-desc">
              <div>${desc}</div>
              <div style="font-size:0.75rem;color:#6b7280;">${dt} • ${hora}</div>
            </div>
            <div class="statement-meta">
              <div class="statement-amount ${classe}">
                ${valor >= 0 ? '' : '- '}${Math.abs(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
              </div>
              <div style="font-size:0.75rem;color:#6b7280;">
                Saldo: ${saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
              </div>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = html;
    }

    let updating = false;
    if (!token) {
      infoEl.textContent = 'Token não encontrado na URL.';
      bigBalanceEl.textContent = 'R$ 0,00';
      bigBalanceEl.classList.add('zero');
      renderStatement(null);
    } else {
      atualizarTudo(true);
      setInterval(() => atualizarTudo(false), 1000);
    }

    function atualizarTudo(initial) {
      if (updating || !token) return;
      updating = true;
      if (initial) infoEl.textContent = 'Carregando dados do cartão...';

      const urlCard = APPS_SCRIPT_URL + '?action=card&token=' + encodeURIComponent(token);
      const urlStmt = APPS_SCRIPT_URL + '?action=statement&token=' + encodeURIComponent(token) + '&limit=20';

      Promise.all([
        fetch(urlCard).then(r => r.json()),
        fetch(urlStmt).then(r => r.json()).catch(() => null)
      ])
      .then(async ([cardData, stmtData]) => {
        if (!cardData || !cardData.success) {
          infoEl.textContent = 'Erro: ' + ((cardData && cardData.error) ? cardData.error : 'falha ao carregar cartão');
          return;
        }

        // saldo grande
        if (!cardData.type){
          const t = inferTypeFromAccountId(cardData);
          if (t) cardData.type = t;
        }

        const bal = Number(cardData.balance || 0);
        bigBalanceEl.textContent = fmtBRL(bal);
        bigBalanceEl.classList.toggle('zero', bal <= 0);

        // desenha cartão (com arte + QR + nome)
        try {
          await desenharCartao(cardData);
        } catch (e) {
          infoEl.textContent = String(e && e.message ? e.message : e);
        }

        if (stmtData && stmtData.success) renderStatement(stmtData);
        else renderStatement(null);

        const now = new Date();
        infoEl.textContent = 'Última atualização: ' + now.toLocaleTimeString('pt-BR');
      })
      .catch(err => {
        console.error(err);
        infoEl.textContent = 'Erro de conexão ao carregar o cartão.';
      })
      .finally(() => {
        updating = false;
      });
    }
  </script>
</body>
</html>
