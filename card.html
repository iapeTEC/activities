<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cartão – Bank of IAPE</title>
  <style>
    :root{
      --bg:#0b1020;
      --text:#e8eefc;
      --muted:rgba(232,238,252,.7);
      --green:#22c55e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(900px 550px at 20% -10%, rgba(34,197,94,.18), transparent 55%),
                  radial-gradient(900px 550px at 90% 10%, rgba(59,130,246,.18), transparent 55%),
                  var(--bg);
      color:var(--text);
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
      padding:18px 12px;
    }
    .wrap{max-width:980px;width:100%}
    .cardWrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }
    canvas{
      width: min(960px, 100%);
      height:auto;
      border-radius:18px;
      box-shadow: 0 16px 44px rgba(0,0,0,.45);
      background:#000;
      cursor:pointer;
      user-select:none;
    }
    .balance{
      font-weight:800;
      letter-spacing:.5px;
      font-size: clamp(34px, 6vw, 64px);
      line-height:1;
      color:var(--green);
      text-align:center;
    }
    .balance.zero{color:#000; text-shadow:none}
    .sub{
      font-size:12px;
      color:var(--muted);
      text-align:center;
      max-width:860px;
    }

    .modal{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.78);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:50;
    }
    .modal.on{display:flex}
    .modalBox{
      width:min(820px, 100%);
      background: rgba(10,14,30,.72);
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      padding:16px;
      box-shadow: 0 18px 56px rgba(0,0,0,.55);
    }
    .modalHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .modalHeader b{font-size:13px;letter-spacing:.2px}
    .modalHeader button{
      appearance:none;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      color:var(--text);
      padding:8px 10px;
      border-radius:10px;
      cursor:pointer;
      font-size:12px;
    }
    #codeCanvas{
      width:100%;
      height:auto;
      background:#fff;
      border-radius:14px;
      display:block;
    }
    .hint{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="cardWrap">
      <canvas id="cardCanvas" width="1536" height="864" aria-label="Cartão do cliente"></canvas>

      <div id="balance" class="balance">R$ 0,00</div>
      <div class="sub" id="sub">Toque no código para ampliar e facilitar a leitura na câmera.</div>
    </div>
  </div>

  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <div class="modalBox">
      <div class="modalHeader">
        <b>Código do cartão</b>
        <button id="btnClose" type="button">Fechar</button>
      </div>
      <canvas id="codeCanvas" width="1024" height="1024"></canvas>
      <div class="hint">Dica: aumente o brilho da tela para ler mais rápido.</div>
    </div>
  </div>

<script>
const ART_INFINITY = "Infinity Black.png";
const ART_DIAMOND  = "diamond.png";

function fmtBRL(n){
  const v = Number(n) || 0;
  return v.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
}
function getToken(){
  const u = new URL(location.href);
  return (u.searchParams.get("t") || u.searchParams.get("token") || "").trim();
}

async function loadQRCodeLib(){
  if (window.QRCode) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js";
    s.onload = resolve;
    s.onerror = () => reject(new Error("Falha ao carregar biblioteca de QR"));
    document.head.appendChild(s);
  });
}

async function makeQRCanvas(text, size){
  await loadQRCodeLib();
  const wrap = document.createElement("div");
  new QRCode(wrap, {
    text,
    width: size,
    height: size,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
  const c = wrap.querySelector("canvas");
  if (c) return c;

  const img = wrap.querySelector("img");
  if (!img) throw new Error("QR não gerado");
  const out = document.createElement("canvas");
  out.width = size; out.height = size;
  const ctx = out.getContext("2d");
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
  ctx.drawImage(img, 0, 0, size, size);
  return out;
}

const cardCanvas = document.getElementById("cardCanvas");
const ctx = cardCanvas.getContext("2d");

const modal = document.getElementById("modal");
const btnClose = document.getElementById("btnClose");
const codeCanvas = document.getElementById("codeCanvas");
const codeCtx = codeCanvas.getContext("2d");

let lastQRRect = null;
let state = {
  token: "",
  type: "INFINITY_BLACK",
  name: "Cliente",
  balance: 0,
  cardUrl: ""
};

function pickArt(type){
  const t = String(type || "").toUpperCase();
  if (t.includes("DIAMOND")) return ART_DIAMOND;
  return ART_INFINITY;
}

function drawTextShadowed(text, x, y, fontPx, align, baseline){
  ctx.save();
  ctx.font = fontPx + "px serif";
  ctx.fillStyle = "#ffffff";
  ctx.textAlign = align || "left";
  ctx.textBaseline = baseline || "alphabetic";
  ctx.shadowColor = "rgba(0,0,0,.55)";
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 2;
  ctx.fillText(text, x, y);
  ctx.restore();
}

async function render(){
  const artPath = pickArt(state.type);

  const bg = new Image();
  bg.crossOrigin = "anonymous";
  const bgLoaded = new Promise((res, rej) => { bg.onload = res; bg.onerror = rej; });
  bg.src = artPath;
  await bgLoaded;

  cardCanvas.width = bg.naturalWidth || 1536;
  cardCanvas.height = bg.naturalHeight || 864;

  ctx.clearRect(0,0,cardCanvas.width, cardCanvas.height);
  ctx.drawImage(bg, 0, 0, cardCanvas.width, cardCanvas.height);

  const qrSize = Math.round(cardCanvas.width * 0.15);
  const qrX = Math.round(cardCanvas.width * 0.82);
  const qrY = Math.round(cardCanvas.height * 0.46);

  const qrCanvas = await makeQRCanvas(state.cardUrl, qrSize);

  const pad = Math.round(qrSize * 0.10);
  const plateW = qrSize + pad*2;
  const plateH = qrSize + pad*2;
  const plateX = qrX - Math.round(plateW/2);
  const plateY = qrY - Math.round(plateH/2);

  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,.96)";
  ctx.strokeStyle = "rgba(0,0,0,.25)";
  ctx.lineWidth = Math.max(2, Math.round(qrSize * 0.015));
  roundRect(ctx, plateX, plateY, plateW, plateH, Math.round(qrSize*0.10));
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  ctx.drawImage(qrCanvas, plateX + pad, plateY + pad, qrSize, qrSize);
  lastQRRect = { x: plateX, y: plateY, w: plateW, h: plateH };

  const name = (state.name || "").trim();
  if (String(state.type || "").toUpperCase().includes("DIAMOND")){
    const x = Math.round(cardCanvas.width * 0.73);
    const y = Math.round(cardCanvas.height * 0.76);
    drawTextShadowed(name, x, y, Math.round(cardCanvas.height * 0.030), "left", "alphabetic");
  } else {
    const x = Math.round(cardCanvas.width * 0.07);
    const y = Math.round(cardCanvas.height * 0.92);
    drawTextShadowed(name, x, y, Math.round(cardCanvas.height * 0.030), "left", "alphabetic");
  }

  const balEl = document.getElementById("balance");
  const bal = Number(state.balance) || 0;
  balEl.textContent = fmtBRL(bal);
  balEl.classList.toggle("zero", bal <= 0);

  await renderModalQR_();
}

async function renderModalQR_(){
  const size = Math.min(codeCanvas.width, codeCanvas.height);
  const qr = await makeQRCanvas(state.cardUrl, size);
  codeCtx.clearRect(0,0,codeCanvas.width, codeCanvas.height);
  codeCtx.fillStyle = "#ffffff";
  codeCtx.fillRect(0,0,codeCanvas.width, codeCanvas.height);

  const s = Math.min(codeCanvas.width, codeCanvas.height);
  const x = Math.round((codeCanvas.width - s)/2);
  const y = Math.round((codeCanvas.height - s)/2);
  codeCtx.drawImage(qr, x, y, s, s);
}

function roundRect(ctx, x, y, w, h, r){
  const rr = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr, y);
  ctx.arcTo(x+w, y, x+w, y+h, rr);
  ctx.arcTo(x+w, y+h, x, y+h, rr);
  ctx.arcTo(x, y+h, x, y, rr);
  ctx.arcTo(x, y, x+w, y, rr);
  ctx.closePath();
}

function openModal(){ modal.classList.add("on"); }
function closeModal(){ modal.classList.remove("on"); }

btnClose.addEventListener("click", closeModal);
modal.addEventListener("click", (ev) => { if (ev.target === modal) closeModal(); });
document.addEventListener("keydown", (ev) => { if (ev.key === "Escape") closeModal(); });

cardCanvas.addEventListener("click", (ev) => {
  if (!lastQRRect) return;
  const rect = cardCanvas.getBoundingClientRect();
  const mx = (ev.clientX - rect.left) * (cardCanvas.width / rect.width);
  const my = (ev.clientY - rect.top)  * (cardCanvas.height / rect.height);

  if (mx >= lastQRRect.x && mx <= lastQRRect.x + lastQRRect.w &&
      my >= lastQRRect.y && my <= lastQRRect.y + lastQRRect.h) {
    openModal();
  }
});

(async function init(){
  const token = getToken();
  if (!token){
    document.getElementById("sub").textContent = "Token ausente na URL. Use ?t=SEU_TOKEN";
    return;
  }

  const api = (new URL(location.href)).searchParams.get("api");
  state.token = token;
  state.cardUrl = location.origin + location.pathname + "?t=" + encodeURIComponent(token) + (api ? ("&api=" + encodeURIComponent(api)) : "");

  if (api){
    try{
      const u = new URL(api);
      u.searchParams.set("action", "card");
      u.searchParams.set("token", token);
      const r = await fetch(u.toString());
      const j = await r.json();
      if (j && j.success){
        state.name = j.name || "Cliente";
        state.balance = j.balance || 0;
        state.type = j.type || state.type;
      } else {
        document.getElementById("sub").textContent = "Não consegui carregar dados do banco. Mostrando cartão local.";
      }
    }catch(e){
      document.getElementById("sub").textContent = "Falha ao consultar o banco. Mostrando cartão local.";
    }
  } else {
    document.getElementById("sub").textContent = "Para puxar nome/saldo, abra com ?api=URL_DO_SCRIPT além do ?t=TOKEN";
  }

  await render();
})();
</script>
</body>
</html>
